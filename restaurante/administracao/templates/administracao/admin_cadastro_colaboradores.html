<meta charset="UTF-8"/>
{% extends "base.html" %}
{% load static %}
{% load restaurante_extras %}
{%block titulo%}{{title}}{%endblock%}

{%block conteudo%}
    <style>
        :root {
            --admin-primary: #6366f1;
            --admin-secondary: #4f46e5;
        }

        .admin-page-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
        }

        .admin-breadcrumb {
            display: flex; gap: 10px; font-size: 0.85em; font-weight: 600; margin-bottom: 10px;
        }
        .admin-breadcrumb a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
        .admin-breadcrumb a:hover { color: var(--admin-primary); }
        .admin-breadcrumb span { color: #ddd; }

        /* Form Card */
        .admin-form-card {
            background: white; border-radius: 24px; padding: 30px; border: 1px solid #e5e7eb;
            margin-bottom: 30px; box-shadow: var(--shadow-sm); max-width: 600px; margin: 0 auto 30px auto;
        }
        .admin-form-card h2 {
            margin: 0 0 25px 0; font-size: 1.3em; color: var(--text-main); display: flex;
            align-items: center; gap: 12px; font-weight: 800;
        }

        .formulario form p { margin-bottom: 20px; }
        .formulario label {
            display: block; font-weight: 700; font-size: 0.8em; color: var(--text-muted);
            text-transform: uppercase; margin-bottom: 8px;
        }
        .formulario input[type="text"], .formulario select {
            width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #e5e7eb;
            background: #f9fafb; font-family: inherit; outline: none; transition: all 0.2s; box-sizing: border-box;
        }
        .formulario input:focus {
            border-color: var(--admin-primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); background: white;
        }

        .btn-save {
            width: 100%; background: var(--admin-primary); color: white; padding: 14px;
            border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 10px;
        }
        .btn-save:hover { background: var(--admin-secondary); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); }

        .btn-action.active {
            background: var(--admin-primary);
            color: white;
            border-color: var(--admin-primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }
    </style>

    <div class="admin-page-header">
        <div style="width: 100%; text-align: center;">
            <div class="admin-breadcrumb" style="justify-content: center;">
                <a href="{% url 'Administracao' %}">Administração</a>
                <span>/</span>
                <a href="{% url 'ExcluirColaboradores' %}">Colaboradores</a>
            </div>
            <h1 style="margin: 0; font-size: 1.8em; color: var(--text-main); font-weight: 800;">Cadastro de Alunos Colaboradores</h1>
        </div>
    </div>

    <!-- Registration Form -->
    <div class="admin-form-card">
        <h2><i class="fas fa-user-tie" style="color: var(--admin-primary);"></i> Registrar Colaborador</h2>
        <div class="formulario">
            <form method="post" action="{% url 'CadastroColaboradores' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" name="commit" class="btn-save">
                    <i class="fas fa-save" style="margin-right: 8px;"></i> Efetivar Cadastro
                </button>
            </form>
        </div>
    </div>
{%endblock%}
