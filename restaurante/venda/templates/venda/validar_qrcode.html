{% extends "base.html" %}
{% load static %}
{% block titulo %}{{title}}{% endblock %}

{% block conteudo %}
    <div style="display: flex; flex-direction: column; align-items: center; width: 100%; padding: 20px;">
        <div style="width: 100%; max-width: 800px; text-align: center;">
            <div class="venda-breadcrumb" style="display: flex; justify-content: center; gap: 10px; font-size: 0.85em; font-weight: 600; margin-bottom: 10px;">
                <a href="{% url 'Vendas' %}" style="color: #10b981; text-decoration: none;">Vendas</a>
                <span style="color: #ddd;">/</span>
                <span style="color: var(--text-muted);">Validação QR Code</span>
            </div>

            <div style="text-align: center; margin-bottom: 40px;">
                <div style="display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; background: rgba(16, 185, 129, 0.1); color: #10b981; border-radius: 20px; margin-bottom: 15px;">
                    <i class="fas fa-qrcode" style="font-size: 1.8em;"></i>
                </div>
                <h1 style="font-size: 2.2em; font-weight: 800; color: var(--text-main); margin: 0;">Validação de QR Code</h1>
                <p style="color: var(--text-muted); margin-top: 5px; font-size: 1.1em;">Escaneie o ticket do aluno para confirmar a venda</p>
            </div>

            <div class="card" style="padding: 30px; text-align: center; background: white; border: 1px solid #eef2ff; margin-bottom: 35px; width: 100%; border-radius: 24px; box-shadow: var(--shadow-sm);">
                <div id="scanner-off">
                    <div style="padding: 40px 20px;">
                        <i class="fas fa-camera" style="font-size: 3em; color: #e2e8f0; margin-bottom: 20px;"></i>
                        <p style="color: var(--text-muted); margin-bottom: 30px;">A câmera está desativada.</p>
                        <button type="button" onclick="iniciarLeitor()" style="width: 100%; max-width: 400px; padding: 18px; background: #10b981; color: white; border: none; border-radius: 16px; font-weight: 700; font-size: 1.1em; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                            <i class="fas fa-play" style="margin-right: 10px;"></i> Iniciar Câmera
                        </button>
                    </div>
                </div>

                <div id="reader-container" style="display:none; position: relative;">
                    <div id="reader" style="width:100%; max-width:400px; margin:0 auto; border-radius: 20px; overflow: hidden; border: 4px solid #10b981;"></div>
                    <div style="margin-top: 25px; display: flex; gap: 10px; justify-content: center;">
                        <button type="button" onclick="fecharLeitor()" style="width: 100%; max-width: 320px; padding: 15px; background: #f1f5f9; color: var(--text-muted); border: none; border-radius: 14px; cursor: pointer; font-weight: 600;">
                            Cancelar
                        </button>
                    </div>
                </div>
            </div>

            <div style="text-align: center;">
                <a href="{% url 'Vendas' %}" style="display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; font-size: 0.95em; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='var(--text-main)'" onmouseout="this.style.color='var(--text-muted)'">
                    <i class="fas fa-arrow-left"></i> Voltar para o Painel
                </a>
            </div>
        </div>

        <!-- Hidden Form for submission -->
        <form id="form-scan" action="{% url 'ValidarTicket' %}" method="post" style="display:none;">
            {% csrf_token %}
            <input type="hidden" name="uuid" id="scan-uuid" />
        </form>
    </div>

    <!-- Styles and Scripts -->
    <style>
        #reader__dashboard_section_csr button {
            background: #6366f1 !important; color: white !important; padding: 8px 15px !important; border-radius: 8px !important; border: none !important; margin: 5px !important;
        }
        #reader__camera_selection {
            padding: 8px !important; border-radius: 8px !important; border: 1px solid #ddd !important; width: 100% !important; margin-bottom: 10px !important;
        }
    </style>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>
        let html5QrcodeScanner;
        function iniciarLeitor() {
            document.getElementById('scanner-off').style.display = 'none';
            document.getElementById('reader-container').style.display = 'block';
            
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { 
                    fps: 10, 
                    qrbox: {width: 250, height: 250},
                    aspectRatio: 1.0
                }, 
                false
            );
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function fecharLeitor() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().then(_ => {
                    document.getElementById('scanner-off').style.display = 'block';
                    document.getElementById('reader-container').style.display = 'none';
                }).catch(error => {
                    console.error("Erro ao fechar scanner", error);
                    window.location.reload(); // Fallback
                });
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Vibração simples se suportada
            if (navigator.vibrate) navigator.vibrate(100);
            
            // Pausar o scanner
            if (html5QrcodeScanner) html5QrcodeScanner.pause();
            
            // Feedback visual antes de enviar
            document.getElementById('reader').style.borderColor = '#10b981';
            
            document.getElementById('scan-uuid').value = decodedText;
            document.getElementById('form-scan').submit();
        }

        function onScanFailure(error) {
            // Omitido para não poluir o console
        }
    </script>

{% endblock %}
